<body>
<div id="gameContainer">
<div class="scene-bg"></div>
<img class="side-lantern left" src="./assets/icons/lantern_left.png" alt="">
<img class="side-lantern right" src="./assets/icons/lantern_right.PNG" alt="">

<button class="lantern-ad right" id="autoItemBtn" type="button" onclick="useAutoItem()"><span class="ad-pic">寻</span><span class="ad-copy">品牌<br>智选</span></button>
<div id="header"><div class="titleBlock"><div class="title-badge">密库寻宝</div><div class="story-line">监察院密探已经逼近，请速速找出内库藏匿的异界神物。</div></div><div class="hudRight"><div class="timerPanel"><span id="timer">10</span></div><div class="progress-area"><div class="progress-dot" id="dot1"></div><div class="progress-dot" id="dot2"></div><div class="progress-dot" id="dot3"></div></div></div></div>
<div class="hint-bar">点击三个 <span style="color:#ff6d5e">红色</span> 花瓶即可通关</div>

<div id="viewport"><div id="shelfArea"></div></div>
<div id="footer"><div class="footer-text">影游共生 · 庆余年</div></div>
<div id="startScreen"><div class="startScroll"><span class="scrollTexture"></span><h1 class="scrollTitle">密库寻宝</h1><p class="missionText">监察院密探已经逼近，请速速找出内库藏匿的异界神物（3个红色花瓶）<span class="timeLine">倒计时10秒钟。</span></p><button class="start-btn" onclick="startGame()">开始寻宝</button></div></div>
<div id="victoryScreen"><div class="screen-panel"><div class="result-mark">✓</div><div class="screen-title">寻宝成功</div><div class="victory-stats" id="victoryStats"></div><div class="adOverlay" id="successAd"><div class="adBadge">京东好物</div><div class="adVisual">令</div><p class="adText">异界神物已现，即刻前往京东领取剧集同款好礼。</p></div><div class="resultActions"><a class="jdLink" id="successJdLink" href="../1马车游戏/jd_product.html">前往京东领取同款好礼</a><button class="jdLink returnVideoLink" id="returnVideoLink" type="button" onclick="returnToVideo()">返回主视频</button></div></div></div>
<div id="failureScreen" class="failure"><div class="screen-panel"><div class="result-mark">!</div><div class="screen-title">密探逼近</div><div class="victory-stats" id="failureStats">十秒已尽，异界神物仍藏在密库深处。</div><div class="adOverlay" id="failureAd"><button class="adClose" type="button" onclick="closeFailureAd()" aria-label="关闭广告">×</button><div class="adBadge">京东好物</div><div class="adVisual">京</div><p class="adText">密库未破，补给先至。即刻前往京东选购剧集同款推荐。</p></div><a class="jdLink" id="failureJdLink" href="../1马车游戏/jd_product.html">前往京东购买补给</a><button class="start-btn" onclick="restartGame()">重新搜寻</button></div></div>
<div class="roleScoreToast" id="roleScoreToast" aria-live="polite"></div>
</div>

<div class="videoCard"><h2>主视频播放中</h2><p>小游戏已关闭，已模拟返回剧集正片播放层。</p></div>

<script>
const SHELF_ROWS=5,BOTTLES_PER_ROW=5,TARGET_COLOR='red',TARGET_COUNT=3,GAME_DURATION=10;

const COLORS=['blue','green','purple','red'];
const viewport=document.getElementById('viewport'),shelfArea=document.getElementById('shelfArea'),timerEl=document.getElementById('timer');
let gameState='start',foundCount=0,tapCount=0,wrongCount=0,startTime=0,timerId=null,rewardLinkTimer=null,returnVideoTimer=null,failureLinkTimer=null,snackItemAvailable=true,pendingMistake=false,autoItemAvailable=true,promptTimer=null;
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function generateLayout(){
    const positions=[];
    for(let r=0;r<SHELF_ROWS;r++)for(let c=0;c<BOTTLES_PER_ROW;c++)positions.push({row:r,col:c});
    for(let i=positions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[positions[i],positions[j]]=[positions[j],positions[i]]}
    const targets=positions.slice(0,TARGET_COUNT),nonTargets=COLORS.filter(x=>x!==TARGET_COLOR),grid=[];
    for(let r=0;r<SHELF_ROWS;r++){
        const row=[];
        for(let c=0;c<BOTTLES_PER_ROW;c++){
            const isTarget=targets.some(p=>p.row===r&&p.col===c);
            row.push(isTarget?TARGET_COLOR:nonTargets[Math.floor(Math.random()*nonTargets.length)]);
        }
        grid.push(row);
    }
    let redCount=grid.flat().filter(color=>color===TARGET_COLOR).length;
    for(let i=TARGET_COUNT;i<positions.length&&redCount<TARGET_COUNT;i++){
        const p=positions[i];
        if(grid[p.row][p.col]!==TARGET_COLOR){
            grid[p.row][p.col]=TARGET_COLOR;
            redCount++;
        }
    }
    return grid;
}
function renderShelves(grid){
    shelfArea.innerHTML='';
    for(let r=0;r<SHELF_ROWS;r++){
        const shelfRow=document.createElement('div');
        shelfRow.className='shelf-row';
        shelfRow.style.top=ROW_BOTTOMS[r]+'%';
        shelfRow.style.marginTop=ROW_OFFSETS[r]+'px';
        const bottlesRow=document.createElement('div');
        bottlesRow.className='bottles-row';
        for(let c=0;c<BOTTLES_PER_ROW;c++){
            const color=grid[r][c],bottle=document.createElement('button');
            bottle.type='button';
            bottle.className='bottle bottle-'+color;
            bottle.dataset.color=color;
            bottle.setAttribute('aria-label',color==='red'?'红色花瓶':'花瓶');
            bottle.innerHTML='<img src="'+POTION_IMAGES[color]+'" alt="">';
            bottle.addEventListener('click',handleBottleTap);
            bottlesRow.appendChild(bottle);
        }
        shelfRow.appendChild(bottlesRow);
        const board=document.createElement('div');
        board.className='shelf-board';
        shelfRow.appendChild(board);
        shelfArea.appendChild(shelfRow);
    }
}
function handleBottleTap(e){
    if(gameState!=='playing')return;
    const bottle=e.currentTarget;
    if(bottle.classList.contains('found-target'))return;
    tapCount++;
    if(bottle.dataset.color===TARGET_COLOR){
        foundCount++;
        bottle.classList.add('found-target');
        bottle.disabled=true;
        updateProgress();
        if(foundCount>=TARGET_COUNT)setTimeout(showVictory,520);
    }else{
        wrongCount++;
        pendingMistake=snackItemAvailable;
        if(snackItemAvailable)showItemPrompt('误选瓶子！点击左侧零食补给，可抵消本次误选。');
        bottle.classList.add('wrong-tap');
        setTimeout(()=>bottle.classList.remove('wrong-tap'),380);
    }
}
function showItemPrompt(text){
    const prompt=document.getElementById('itemPrompt');
    prompt.textContent=text;
    prompt.classList.add('visible');
    if(promptTimer)clearTimeout(promptTimer);
    promptTimer=setTimeout(()=>prompt.classList.remove('visible'),3200);
}
function hideItemPrompt(){
    if(promptTimer)clearTimeout(promptTimer);
    promptTimer=null;
    document.getElementById('itemPrompt').classList.remove('visible');
}
function useSnackItem(){
    if(gameState!=='playing'||!snackItemAvailable)return;
    if(!pendingMistake){showItemPrompt('零食补给会在误选后生效。');return}
    wrongCount=Math.max(0,wrongCount-1);
    pendingMistake=false;
    snackItemAvailable=false;
    document.getElementById('snackItemBtn').disabled=true;
    showItemPrompt('体力已恢复，本次误选不计入记录。');
}
function useAutoItem(){
    if(gameState!=='playing'||!autoItemAvailable)return;
    autoItemAvailable=false;
    document.getElementById('autoItemBtn').disabled=true;
    document.querySelectorAll('.bottle-red').forEach(bottle=>{
        if(!bottle.classList.contains('found-target')){
            bottle.classList.add('found-target');
            bottle.disabled=true;
        }
    });
    foundCount=TARGET_COUNT;
    updateProgress();
    hideItemPrompt();
    setTimeout(showVictory,520);
}
function updateProgress(){for(let i=1;i<=TARGET_COUNT;i++)document.getElementById('dot'+i).classList.toggle('found',i<=foundCount)}
function updateTimer(){
    if(gameState!=='playing')return;
    const elapsed=(Date.now()-startTime)/1000,timeLeft=Math.max(0,Math.ceil(GAME_DURATION-elapsed)),warning=timeLeft>0&&timeLeft<=3;
    timerEl.textContent=String(timeLeft);
    timerEl.classList.toggle('warning',warning);
    timerEl.parentElement.classList.toggle('warning',warning);
    if(elapsed>=GAME_DURATION)showFailure();
}
function clearTimer(){if(timerId)clearInterval(timerId);timerId=null}
function clearAdTimers(){if(rewardLinkTimer)clearTimeout(rewardLinkTimer);if(returnVideoTimer)clearTimeout(returnVideoTimer);if(failureLinkTimer)clearTimeout(failureLinkTimer);rewardLinkTimer=null;returnVideoTimer=null;failureLinkTimer=null}
function showRoleScoreToast(isSuccess){const role=localStorage.getItem('qingyunianSelectedRole')||'所选角色',added=isSuccess?5:2,total=Math.floor(Math.random()*8001)+2000,toast=document.getElementById('roleScoreToast');toast.innerHTML='为<strong>'+role+'</strong>加了<strong>'+added+'</strong>分<br>现在全服总分是：<strong>'+total+'</strong>';toast.classList.add('visible')}
function showVictory(){
    if(gameState!=='playing')return;
    gameState='victory';
    clearTimer();
    const elapsed=Math.min(GAME_DURATION,(Date.now()-startTime)/1000).toFixed(1);
    const mistakeText=wrongCount>0?' · 误选 '+wrongCount+' 次':'';
    document.getElementById('victoryStats').textContent='用时 '+elapsed+' 秒 · 点击 '+tapCount+' 次'+mistakeText;
    showRoleScoreToast(true);
    document.getElementById('victoryScreen').style.display='flex';
    rewardLinkTimer=setTimeout(()=>document.getElementById('successJdLink').classList.add('visible'),1000);
    returnVideoTimer=setTimeout(()=>document.getElementById('returnVideoLink').classList.add('visible'),3000);
}
function showFailure(){
    if(gameState!=='playing')return;
    gameState='failure';
    clearTimer();
    timerEl.textContent='0';
    timerEl.classList.add('warning');
    timerEl.parentElement.classList.add('warning');
    document.getElementById('failureStats').textContent='找到 '+foundCount+' / '+TARGET_COUNT+' 个红色花瓶，十秒已尽。';
    showRoleScoreToast(false);
    document.getElementById('failureScreen').style.display='flex';
    failureLinkTimer=setTimeout(()=>document.getElementById('failureJdLink').classList.add('visible'),3000);
}
function closeFailureAd(){document.getElementById('failureAd').classList.add('closed')}
function returnToVideo(){
    if(window.stopInteractiveBgm)window.stopInteractiveBgm();
    window.location.assign('../../character-selection-dialogue-new.html');
}
function startGame(){
    gameState='playing';
    clearAdTimers();
    foundCount=0;
    tapCount=0;
    wrongCount=0;
    snackItemAvailable=true;
    pendingMistake=false;
    autoItemAvailable=true;
    startTime=Date.now();
    clearTimer();
    timerEl.textContent=String(GAME_DURATION);
    timerEl.classList.remove('warning');
    timerEl.parentElement.classList.remove('warning');
    updateProgress();
    renderShelves(generateLayout());
    document.getElementById('startScreen').style.display='none';
    document.getElementById('victoryScreen').style.display='none';
    document.getElementById('failureScreen').style.display='none';
    document.getElementById('roleScoreToast').classList.remove('visible');
    document.getElementById('successJdLink').classList.remove('visible');
    document.getElementById('returnVideoLink').classList.remove('visible');
    document.getElementById('failureJdLink').classList.remove('visible');
    document.getElementById('failureAd').classList.remove('closed');
    document.getElementById('gameContainer').style.display='block';
    document.getElementById('videoLayer').classList.remove('visible');
    document.getElementById('snackItemBtn').disabled=false;
    document.getElementById('autoItemBtn').disabled=false;
    hideItemPrompt();
    timerId=setInterval(updateTimer,120);
    updateTimer();
}
function restartGame(){startGame()}
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
</script>
<script>
(function(){
    const bgm=new Audio('../../demosource2-assets/bgm.mp3');
    bgm.loop=true;
    bgm.volume=0;
    let started=false,frame=null;
    function fadeIn(){
        if(frame)cancelAnimationFrame(frame);
        const targetVolume=.36,duration=1800,start=performance.now();
        function step(now){
            const progress=Math.min(1,(now-start)/duration);
            bgm.volume=targetVolume*progress;
            if(progress<1)frame=requestAnimationFrame(step);
        }
        frame=requestAnimationFrame(step);
    }
    function startBgm(){
        if(started)return;
        started=true;
        bgm.play().then(fadeIn).catch(()=>{started=false});
    }
    window.stopInteractiveBgm=function(){
        if(frame)cancelAnimationFrame(frame);
        bgm.pause();
        bgm.currentTime=0;
    };
    window.addEventListener('load',startBgm);
    document.addEventListener('pointerdown',startBgm,{once:true});
    document.addEventListener('keydown',startBgm,{once:true});
})();
</script>
